parameters:
  - name: list
    type: object
    default:
      - here
      - there
  - name: env
    type: object
    default:
      here: there
      there: here
  - name: globalVars
    type: object
    default:
      - --x=y,z
      - supportThings
  - name: localVars
    type: object
    default:
      - --a=b,c
      - supportThose
  - name: script
    type: object
    default: {}

stages:
  - stage:
    displayName: Deploy
    variables:
      - group: base
      - group: dev

    jobs:
      - job:
        displayName: Deploy Env
        steps:
          - script: echo $(business_unit)
            displayName: show BU

          - script: echo ${{ join(' ', parameters.list) }}
            displayName: show list

          - task: Bash@3
            displayName: Show dynamic env
            env: ${{ parameters.env }}
            inputs:
              targetType: inline
              args: ${{ format("%s %s", join(' ', parameters.globalVars), join(' ', parameters.localVars) )}}
              script: |
                echo "$@"
                echo "$*"
                echo $(environment)
                echo $(ENVIRONMENT)
                echo $(business_unit)
                echo $(BUSINESS_UNIT)
                env              

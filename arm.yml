parameters:
  - name: list
    type: object
    default:
      - here
      - there
  - name: env
    type: object
    default:
      here: there
      there: here
  - name: globalVars
    type: object
    default:
      - --x=y,z
      - --supportThings
  - name: localVars
    type: object
    default:
      - --a=b,c
      - --supportThose
  - name: script
    type: object
    default: {}

stages:
  - stage:
    displayName: Deploy
    variables:
      - group: base
      - group: dev

    jobs:
      - job:
        displayName: Deploy Env
        steps:
#          - script: echo $(business_unit)
#            displayName: show BU
#
#          - script: echo ${{ join(' ', parameters.list) }}
#            displayName: show list
#
          - bash: echo "${{ join(' ', parameters.globalVars) }}"
            displayName: show globalVars

          - bash: echo "${{ format('-->| {0} |<--', join(' ', parameters.globalVars)) }}"
            displayName: show format of globalVars

          - bash: echo "${{ join(' ', parameters.localVars) }}"
            displayName: show localVars

          - bash: echo "${{ format('-->| {0} |<--', join(' ', parameters.localVars)) }}"
            displayName: show format of localVars

          - task: Bash@3
            displayName: Show dynamic env
            env: ${{ parameters.env }}
            inputs:
              targetType: filePath
              filePath: ./script.sh
              arguments: >-
                ${{ join(' ', parameters.globalVars) }}
                ${{ join(' ', parameters.localVars) }}

parameters:
  - name: script
    type: object
    default: {}

stages:
  - stage:
    displayName: Deploy
    variables:
      - group: base
      - group: dev

    jobs:
      - job:
        displayName: Deploy Env
        steps:
          - bash: echo "${{ join(' ', parameters.script.globalVars) }}"
            displayName: show globalVars

          - bash: echo "${{ format('-->| {0} |<--', join(' ', parameters.script.globalVars)) }}"
            displayName: show format of globalVars

          - bash: echo "${{ join(' ', parameters.script.localVars) }}"
            displayName: show localVars

          - bash: echo "${{ format('-->| {0} |<--', join(' ', parameters.script.localVars)) }}"
            displayName: show format of localVars

          - task: Bash@3
            displayName: Show dynamic env
            env: ${{ parameters.script.globalEnv }}
            inputs:
              targetType: filePath
              filePath: ${{ parameters.script.path }}
              arguments: >-
                ${{ join(' ', parameters.script.globalVars) }}
                ${{ join(' ', parameters.script.localVars) }}
